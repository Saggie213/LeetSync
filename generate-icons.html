<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
// Generate icons at multiple sizes
const sizes = [16, 32, 48, 128];

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, size, size);
  bgGrad.addColorStop(0, '#0f0f1e');
  bgGrad.addColorStop(1, '#0a0a14');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, 0, 0, size, size, size * 0.18);

  // Orange glow
  const glowSize = size * 0.7;
  const glow = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, glowSize);
  glow.addColorStop(0, 'rgba(255, 161, 22, 0.15)');
  glow.addColorStop(1, 'rgba(255, 161, 22, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Draw sync arrows + code bracket
  const s = size;
  ctx.strokeStyle = '#ffa116';
  ctx.lineWidth = Math.max(1.5, s * 0.06);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Left bracket <
  ctx.beginPath();
  ctx.moveTo(s * 0.42, s * 0.28);
  ctx.lineTo(s * 0.25, s * 0.5);
  ctx.lineTo(s * 0.42, s * 0.72);
  ctx.stroke();

  // Right bracket >
  ctx.beginPath();
  ctx.moveTo(s * 0.58, s * 0.28);
  ctx.lineTo(s * 0.75, s * 0.5);
  ctx.lineTo(s * 0.58, s * 0.72);
  ctx.stroke();

  // Sync dot center
  const grad = ctx.createLinearGradient(s*0.4, s*0.4, s*0.6, s*0.6);
  grad.addColorStop(0, '#ffa116');
  grad.addColorStop(1, '#ff8c00');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Download
  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();

  document.body.appendChild(canvas);
  document.body.appendChild(document.createElement('br'));
});

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}
</script>
</body>
</html>
